<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Generator Pro | JagoNgulik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="max-w-3xl w-full bg-white rounded-lg shadow-sm border border-slate-200 p-8">
        <div class="border-b border-slate-200 pb-5 mb-6">
            <h1 class="text-2xl font-semibold text-slate-900">Content Engine</h1>
            <p class="text-sm text-slate-500 mt-1">Generate highly optimized social media copy using your personal API key.</p>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-slate-50 p-4 rounded-md border border-slate-200">
                <label class="block text-sm font-medium text-slate-700 mb-1">Google Gemini API Key</label>
                <div class="flex gap-2">
                    <input type="password" id="apiKey" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none transition-colors" placeholder="Enter your API key">
                    <button onclick="saveKey()" class="px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-medium rounded-md transition-colors whitespace-nowrap">Save Key</button>
                </div>
                <p id="keyStatus" class="text-xs text-slate-500 mt-2">API Key is stored locally in your browser.</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Content Format</label>
                    <select id="sosmedType" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none bg-white">
                        <option value="tiktok">TikTok Strategy (Hook & Caption)</option>
                        <option value="ig">Instagram Layout (Carousel/Reels)</option>
                        <option value="youtube">YouTube SEO (Metadata)</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Subject Matter / Topic</label>
                <textarea id="topic" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-md text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none" placeholder="Provide specific details about your content topic..."></textarea>
            </div>

            <button id="btnGenerate" onclick="generateContent()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-md transition-colors text-sm">
                Generate Output
            </button>
        </div>

        <div id="resultArea" class="mt-8 hidden">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-semibold text-slate-900">Generated Output</h3>
                <button onclick="copyToClipboard()" class="text-xs text-blue-600 hover:text-blue-800 font-medium">Copy to clipboard</button>
            </div>
            <div id="loading" class="hidden py-10 text-center text-sm text-slate-500">Processing request...</div>
            <textarea id="output" rows="12" class="w-full px-4 py-3 border border-slate-200 rounded-md bg-slate-50 text-sm outline-none font-mono text-slate-700 leading-relaxed" readonly></textarea>
        </div>
    </div>

    <script>
        // Load API Key on startup
        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) {
                document.getElementById('apiKey').value = savedKey;
                document.getElementById('keyStatus').innerText = "API Key loaded from local storage.";
            }
        });

        function saveKey() {
            const key = document.getElementById('apiKey').value;
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                document.getElementById('keyStatus').innerText = "Key successfully saved to local storage.";
                document.getElementById('keyStatus').classList.add('text-green-600');
            }
        }

        async function generateContent() {
            const apiKey = document.getElementById('apiKey').value;
            const sosmedType = document.getElementById('sosmedType').value;
            const topic = document.getElementById('topic').value;
            const btnGenerate = document.getElementById('btnGenerate');
            const resultArea = document.getElementById('resultArea');
            const output = document.getElementById('output');
            const loading = document.getElementById('loading');

            if(!apiKey || !topic) {
                alert("Please provide both API Key and Subject Matter.");
                return;
            }

            // Aturan ketat: TANPA EMOJI
            const noEmojiRule = "PENTING: Jangan gunakan emoji atau emoticon sama sekali dalam seluruh balasanmu. Gunakan bahasa profesional, terstruktur, dan natural layaknya copywriter manusia berpengalaman.";

            let prompt = "";
            if(sosmedType === "tiktok") {
                prompt = `Kamu adalah Copywriter TikTok profesional. Buatkan 3 pilihan 'Hook' yang memancing rasa penasaran dalam 3 detik pertama, diikuti caption singkat yang menarik, dan 7 hashtag relevan. Topik: ${topic}. ${noEmojiRule}`;
            } else if(sosmedType === "ig") {
                prompt = `Kamu adalah Social Media Specialist. Buatkan struktur konten Instagram Reels/Carousel berdasarkan topik: ${topic}. Berikan judul analitis, poin-poin isi konten (maks 5 slide), caption dengan Call to Action yang jelas, dan 10 hashtag spesifik. ${noEmojiRule}`;
            } else if(sosmedType === "youtube") {
                prompt = `Kamu adalah pakar SEO YouTube. Untuk video dengan topik ${topic}, berikan 3 alternatif Judul yang dioptimasi untuk rasio klik-tayang (CTR), 2 paragraf Deskripsi yang natural dan mengandung kata kunci target, serta daftar 15 Tags yang dipisahkan dengan koma. ${noEmojiRule}`;
            }

            btnGenerate.disabled = true;
            btnGenerate.innerText = "Executing...";
            resultArea.classList.remove('hidden');
            output.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                
                if(data.error) {
                    throw new Error(data.error.message);
                }

                output.value = data.candidates[0].content.parts[0].text;
                
            } catch (error) {
                output.value = "Error processing request: " + error.message;
            } finally {
                loading.classList.add('hidden');
                output.classList.remove('hidden');
                btnGenerate.disabled = false;
                btnGenerate.innerText = "Generate Output";
            }
        }

        function copyToClipboard() {
            const outputText = document.getElementById('output');
            outputText.select();
            document.execCommand('copy');
            alert("Content copied to clipboard.");
        }
    </script>
</body>
</html>
