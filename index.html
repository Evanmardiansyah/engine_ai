<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Engine Pro | JagoNgulik</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        textarea { transition: height 0.2s ease, border-color 0.2s ease; }
        /* Custom Scrollbar untuk Textarea */
        textarea::-webkit-scrollbar { width: 6px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 via-slate-100 to-blue-50 text-slate-800 min-h-screen flex flex-col items-center py-10 px-4 sm:px-6 lg:px-8 relative overflow-x-hidden">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[800px] h-[400px] bg-blue-500/10 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

    <div class="max-w-3xl w-full mb-8 text-center mt-2 relative">
        <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold tracking-wide uppercase mb-4 shadow-sm border border-blue-200">
            <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 01-.383-.218 25.18 25.18 0 01-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 8.25 3c1.804 0 3.48.875 4.5 2.298C13.77 3.875 15.446 3 17.25 3c3.536 0 6 2.322 6 5.25 0 3.924-2.438 7.111-4.739 9.256a25.175 25.175 0 01-4.244 3.17 15.247 15.247 0 01-.383.219l-.022.012-.007.004-.003.001a.752.752 0 01-.704 0l-.003-.001z" /></svg>
            JagoNgulik Tools
        </span>
        <h1 class="text-3xl sm:text-5xl font-extrabold text-slate-900 mb-4 tracking-tight">Content <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">Engine Pro</span></h1>
        <p class="text-slate-600 text-sm sm:text-base leading-relaxed max-w-xl mx-auto font-medium">
            Tingkatkan kualitas konten media sosial Anda dengan AI. Hasilkan naskah, caption, dan strategi terstruktur dalam hitungan detik.
        </p>
    </div>

    <div class="max-w-3xl w-full bg-white/80 backdrop-blur-xl rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-white/50 p-6 sm:p-8 relative z-10">
        <div class="grid grid-cols-1 gap-6">
            
            <div class="bg-slate-100/50 p-5 rounded-xl border border-slate-200/60">
                <label class="block text-sm font-bold text-slate-800 mb-1.5 flex items-center gap-2">
                    <svg class="w-4 h-4 text-slate-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25a3 3 0 013 3m3 0a6 6 0 01-7.029 5.912c-.563-.097-1.159.026-1.563.43L10.5 17.25H8.25v2.25H6v2.25H2.25v-2.818c0-.597.237-1.17.659-1.591l6.499-6.499c.404-.404.527-1 .43-1.563A6 6 0 1121.75 8.25z" /></svg>
                    Koneksi API Gemini
                </label>
                <div class="flex flex-col sm:flex-row gap-3 mt-2">
                    <input type="password" id="apiKey" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all bg-white placeholder-slate-400 shadow-sm" placeholder="Paste Google AI API Key Anda...">
                    <button onclick="saveAndLoadKey()" class="w-full sm:w-auto px-6 py-2.5 bg-slate-900 hover:bg-slate-800 text-white text-sm font-semibold rounded-lg transition-all whitespace-nowrap shadow-md hover:shadow-lg active:scale-95 flex items-center justify-center gap-2">
                        Hubungkan
                    </button>
                </div>
                <div class="mt-2.5 flex items-center justify-between">
                    <p id="keyStatus" class="text-xs font-medium text-slate-500 flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 rounded-full bg-slate-400 animate-pulse"></span> Belum terhubung.
                    </p>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
                <div class="sm:col-span-1">
                    <label class="block text-sm font-bold text-slate-800 mb-2">Model AI</label>
                    <select id="aiModel" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none bg-white cursor-pointer disabled:bg-slate-100 disabled:cursor-not-allowed shadow-sm transition-colors">
                        <option value="">Menunggu API...</option>
                    </select>
                </div>

                <div class="sm:col-span-1">
                    <label class="block text-sm font-bold text-slate-800 mb-2">Platform / Format</label>
                    <select id="sosmedType" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none bg-white cursor-pointer shadow-sm transition-colors">
                        <option value="tiktok">TikTok (Hook & Script)</option>
                        <option value="ig">Instagram (Carousel / Reels)</option>
                        <option value="youtube">YouTube (SEO Metadata)</option>
                        <option value="linkedin">LinkedIn (Professional)</option>
                    </select>
                </div>

                <div class="sm:col-span-1">
                    <label class="block text-sm font-bold text-slate-800 mb-2">Gaya Bahasa (Tone)</label>
                    <select id="toneType" class="w-full px-4 py-2.5 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none bg-white cursor-pointer shadow-sm transition-colors">
                        <option value="Profesional dan informatif">Profesional & Informatif</option>
                        <option value="Santai, kekinian, dan asik">Santai & Kekinian</option>
                        <option value="Provokatif, kontroversial, dan memancing debat">Provokatif (Debatable)</option>
                        <option value="Humoris, lucu, dan menghibur">Humoris & Lucu</option>
                        <option value="Inspiratif, memotivasi, dan menyentuh emosi">Inspiratif & Motivasi</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-800 mb-2 flex items-center justify-between">
                    Topik atau Instruksi Spesifik
                    <span class="text-xs font-normal text-slate-500">Makin detail, makin bagus.</span>
                </label>
                <textarea id="topic" rows="3" class="w-full px-4 py-3 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none resize-y shadow-sm transition-colors placeholder-slate-400" placeholder="Contoh: Buatkan konten tentang fakta unik musang sebagai hewan penyebar biji kopi di Indonesia..."></textarea>
            </div>

            <button id="btnGenerate" onclick="generateContent()" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3.5 rounded-lg transition-all shadow-lg hover:shadow-indigo-500/30 active:scale-[0.98] flex justify-center items-center gap-2 text-sm sm:text-base border border-indigo-700/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/></svg>
                Mulai Generate Konten
            </button>
        </div>

        <div id="resultArea" class="mt-8 hidden border-t border-slate-200/80 pt-8">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-5 gap-3">
                <h3 class="text-lg font-bold text-slate-900 flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M2.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75S2.25 17.385 2.25 12zm13.36-1.814a.75.75 0 10-1.22-.872l-3.236 4.53L9.53 12.22a.75.75 0 00-1.06 1.06l2.25 2.25a.75.75 0 001.14-.094l3.75-5.25z" clip-rule="evenodd" /></svg>
                    Hasil Generate AI
                </h3>
                <button id="btnDownload" onclick="downloadTXT()" class="text-sm px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white rounded-lg transition-all font-semibold shadow-md flex items-center gap-2 active:scale-95 hidden">
                    <svg class="w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3" /></svg>
                    Download .txt
                </button>
            </div>
            
            <div id="loading" class="hidden py-14 text-center flex-col items-center justify-center gap-4 bg-slate-50/50 rounded-xl border border-slate-100">
                <div class="relative w-10 h-10">
                    <div class="absolute inset-0 border-4 border-blue-200 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin"></div>
                </div>
                <p class="text-sm font-semibold text-slate-500 animate-pulse">Menulis dan menyusun struktur konten...</p>
            </div>
            
            <div id="outputContainer" class="space-y-5"></div>
        </div>
    </div>

    <div class="mt-8 text-center pb-8">
        <p class="text-sm font-medium text-slate-400">Powered by Gemini AI • Crafted for JagoNgulik.com</p>
    </div>

    <script>
        // Global variable untuk menyimpan hasil text mentah (untuk keperluan download)
        let generatedTextData = "";

        document.addEventListener("DOMContentLoaded", () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if(savedKey) {
                document.getElementById('apiKey').value = savedKey;
                updateStatus(true, "✅ API Key terhubung dari sistem.");
                loadModels(savedKey);
            }
        });

        function updateStatus(isSuccess, message) {
            const statusEl = document.getElementById('keyStatus');
            statusEl.innerHTML = message;
            statusEl.className = `text-xs font-semibold flex items-center gap-1.5 ${isSuccess ? 'text-emerald-600' : 'text-red-500'}`;
        }

        function saveAndLoadKey() {
            const key = document.getElementById('apiKey').value;
            if(key) {
                localStorage.setItem('gemini_api_key', key);
                updateStatus(true, "⏳ Memverifikasi dan memuat model...");
                loadModels(key);
            } else {
                alert("API Key tidak boleh kosong.");
            }
        }

        async function loadModels(apiKey) {
            const modelSelect = document.getElementById('aiModel');
            modelSelect.innerHTML = '<option value="">Memuat daftar model...</option>';
            modelSelect.disabled = true;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const validModels = data.models.filter(m => 
                    m.supportedGenerationMethods.includes("generateContent") && 
                    m.name.includes("gemini") &&
                    !m.name.includes("vision") // menghindari model yang murni cuma buat gambar
                );

                modelSelect.innerHTML = '';
                if (validModels.length === 0) {
                    modelSelect.innerHTML = '<option value="">Tidak ada model yang kompatibel</option>';
                    return;
                }

                // Reverse untuk mengutamakan model terbaru (biasanya di bawah)
                validModels.reverse().forEach(model => {
                    const option = document.createElement('option');
                    option.value = model.name; 
                    option.text = `${model.displayName} (${model.version})`;
                    modelSelect.appendChild(option);
                });
                modelSelect.disabled = false;
                updateStatus(true, "✅ Sistem Terhubung. Mesin Siap.");
            } catch (error) {
                modelSelect.innerHTML = '<option value="">Gagal memuat. Cek API Key.</option>';
                updateStatus(false, "❌ Gagal memuat. Pastikan API Key valid.");
            }
        }

        async function generateContent() {
            const apiKey = document.getElementById('apiKey').value;
            const selectedModel = document.getElementById('aiModel').value;
            const sosmedType = document.getElementById('sosmedType').value;
            const toneType = document.getElementById('toneType').value;
            const topic = document.getElementById('topic').value;
            const btnGenerate = document.getElementById('btnGenerate');
            const resultArea = document.getElementById('resultArea');
            const outputContainer = document.getElementById('outputContainer');
            const loading = document.getElementById('loading');
            const btnDownload = document.getElementById('btnDownload');

            if(!apiKey || !selectedModel || !topic) {
                alert("Mohon lengkapi API Key, Model AI, dan Topik Konten.");
                return;
            }

            // Aturan Super Ketat + Tone of Voice
            const schemaPrompt = `Gunakan gaya bahasa / tone: **${toneType}**. Kamu harus merespon HANYA dengan format JSON Array persis seperti ini: [{"title": "Nama Bagian", "content": "Isi teks bagian tersebut"}]. Dilarang menggunakan emoji atau emoticon apapun.`;

            let prompt = "";
            switch(sosmedType) {
                case "tiktok": 
                    prompt = `Kamu Copywriter TikTok. Topik: ${topic}. ${schemaPrompt} Berikan 3 objek: 1) title: "Hook / Judul", content: 3 ide hook memikat. 2) title: "Isi Konten / Naskah", content: naskah video. 3) title: "Hashtags", content: 7 hashtag relevan dipisah spasi.`; 
                    break;
                case "ig": 
                    prompt = `Kamu Social Media Specialist. Topik: ${topic}. ${schemaPrompt} Berikan 3 objek: 1) title: "Judul Konten", content: 1 judul yang mengundang klik. 2) title: "Isi Konten / Caption", content: Paragraf caption yang rapi dan memuat Call to Action. 3) title: "Hashtags", content: 10 hashtag relevan dipisah spasi.`; 
                    break;
                case "youtube": 
                    prompt = `Kamu pakar SEO YouTube. Topik: ${topic}. ${schemaPrompt} Berikan 3 objek: 1) title: "Judul Video", content: 3 opsi judul CTR tinggi. 2) title: "Isi Konten / Deskripsi", content: 2 paragraf deskripsi lengkap dengan keyword. 3) title: "Tags", content: 15 tag spesifik dipisah dengan koma.`; 
                    break;
                case "linkedin": 
                    prompt = `Kamu Expert LinkedIn. Topik: ${topic}. ${schemaPrompt} Berikan 2 objek: 1) title: "Hook / Pembuka", content: Kalimat pemancing diskusi. 2) title: "Isi Postingan", content: Draf profesional berparagraf pendek dan ditutup dengan pertanyaan pemantik komentar.`; 
                    break;
            }

            // Reset UI
            btnGenerate.disabled = true;
            btnGenerate.innerHTML = "Mesin Bekerja...";
            btnGenerate.classList.add('opacity-80', 'cursor-not-allowed');
            resultArea.classList.remove('hidden');
            outputContainer.innerHTML = '';
            outputContainer.classList.add('hidden');
            btnDownload.classList.add('hidden');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            generatedTextData = ""; // Reset string download

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${selectedModel}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        generationConfig: { 
                            temperature: 0.7,
                            responseMimeType: "application/json" 
                        }
                    })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                let rawText = data.candidates[0].content.parts[0].text;
                let parsedData = JSON.parse(rawText);

                // Build string for Download TXT
                parsedData.forEach(section => {
                    generatedTextData += `=== ${section.title} ===\n${section.content}\n\n`;
                });

                parsedData.forEach((section, index) => {
                    const sectionId = `section-${index}`;
                    const html = `
                        <div class="group border border-slate-200 rounded-xl overflow-hidden bg-white shadow-sm transition-all hover:shadow-md hover:border-blue-200">
                            <div class="bg-slate-50 border-b border-slate-100 px-5 py-3.5 flex justify-between items-center">
                                <h4 class="font-extrabold text-slate-800 text-sm tracking-wide uppercase flex items-center gap-2">
                                    <span class="w-1.5 h-4 bg-blue-600 rounded-full"></span>
                                    ${section.title}
                                </h4>
                                <button onclick="copySectionText('${sectionId}', this)" class="text-xs px-3.5 py-1.5 bg-white hover:bg-slate-100 text-slate-700 rounded-lg transition-all font-semibold border border-slate-200 shadow-sm active:scale-95 flex items-center gap-1.5 group-hover:border-blue-300">
                                    <svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.876a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75" /></svg>
                                    Salin Teks
                                </button>
                            </div>
                            <div class="p-5 bg-white">
                                <textarea id="${sectionId}" class="w-full bg-transparent text-sm text-slate-700 font-medium resize-none outline-none leading-relaxed" readonly>${section.content}</textarea>
                            </div>
                        </div>
                    `;
                    outputContainer.insertAdjacentHTML('beforeend', html);
                    
                    setTimeout(() => {
                        const tx = document.getElementById(sectionId);
                        tx.style.height = "auto";
                        tx.style.height = (tx.scrollHeight + 5) + "px";
                    }, 50);
                });

                // Show download button
                btnDownload.classList.remove('hidden');

            } catch (error) {
                outputContainer.innerHTML = `
                    <div class="p-5 bg-red-50 border border-red-200 rounded-xl flex items-start gap-3">
                        <svg class="w-5 h-5 text-red-600 mt-0.5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" d="M9.401 3.003c1.155-2 4.043-2 5.197 0l7.355 12.748c1.154 2-.29 4.5-2.599 4.5H4.645c-2.309 0-3.752-2.5-2.598-4.5L9.4 3.003zM12 8.25a.75.75 0 01.75.75v3.75a.75.75 0 01-1.5 0V9a.75.75 0 01.75-.75zm0 8.25a.75.75 0 100-1.5.75.75 0 000 1.5z" clip-rule="evenodd" /></svg>
                        <div>
                            <h4 class="text-sm font-bold text-red-800">Terjadi Kesalahan</h4>
                            <p class="text-sm text-red-600 mt-1">${error.message}</p>
                        </div>
                    </div>`;
            } finally {
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                outputContainer.classList.remove('hidden');
                btnGenerate.disabled = false;
                btnGenerate.classList.remove('opacity-80', 'cursor-not-allowed');
                btnGenerate.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.251.068a.5.5 0 0 1 .227.58L9.677 6.5H13a.5.5 0 0 1 .364.843l-8 8.5a.5.5 0 0 1-.842-.49L6.323 9.5H3a.5.5 0 0 1-.364-.843l8-8.5a.5.5 0 0 1 .615-.09z"/></svg> Mulai Generate Konten`;
            }
        }

        function copySectionText(elementId, btnElement) {
            const outputText = document.getElementById(elementId);
            if(!outputText.value) return;
            
            outputText.select();
            document.execCommand('copy');
            window.getSelection().removeAllRanges(); 
            
            const originalHTML = btnElement.innerHTML;
            btnElement.innerHTML = `<svg class="w-3.5 h-3.5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" /></svg> Tersalin!`;
            btnElement.classList.replace('text-slate-700', 'text-blue-700');
            btnElement.classList.replace('bg-white', 'bg-blue-50');
            btnElement.classList.replace('border-slate-200', 'border-blue-300');
            
            setTimeout(() => {
                btnElement.innerHTML = originalHTML;
                btnElement.classList.replace('text-blue-700', 'text-slate-700');
                btnElement.classList.replace('bg-blue-50', 'bg-white');
                btnElement.classList.replace('border-blue-300', 'border-slate-200');
            }, 2000);
        }

        function downloadTXT() {
            if(!generatedTextData) return;
            
            const blob = new Blob([generatedTextData], { type: "text/plain;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            
            const date = new Date();
            const filename = `JagoNgulik_Content_${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2, '0')}${date.getDate().toString().padStart(2, '0')}.txt`;
            
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
